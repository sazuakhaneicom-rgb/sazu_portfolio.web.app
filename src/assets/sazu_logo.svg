<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#7c3aed"/>
  <!-- Inner background subtle glow -->
  <rect width="100" height="100" rx="22" fill="url(#glow)" opacity="0.3"/>
  <!-- Letter M -->
  <text x="50" y="62" font-family="Georgia, serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">S</text>
  <!-- Decorative dots -->
  <circle cx="18" cy="18" r="4" fill="white" opacity="0.3"/>
  <circle cx="82" cy="82" r="4" fill="white" opacity="0.3"/>
  <!-- Top accent line -->
  <rect x="28" y="20" width="44" height="2.5" rx="1.5" fill="white" opacity="0.4"/>
  <!-- Bottom accent line -->
  <rect x="28" y="77" width="44" height="2.5" rx="1.5" fill="white" opacity="0.4"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
